name: CI

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: webui/package-lock.json
      - run: WEBUI_PM=npm WEBUI_INSTALL=ci ./scripts/check.sh
      - run: npx playwright install --with-deps chromium
        working-directory: webui
      - run: ./scripts/webui-smoke.sh
      - name: Benchmarks
        run: |
          packages="$(go list ./... | grep -v '/webui/node_modules/')"
          go test -run '^$' -bench=. -benchmem -benchtime=100ms -count=1 ${packages}

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - run: ./scripts/build.sh
        env:
          VERSION: ${{ github.ref_name }}
      - run: ./scripts/sign-release.sh
        env:
          RELEASE_GPG_PRIVATE_KEY_B64: ${{ secrets.RELEASE_GPG_PRIVATE_KEY_B64 }}
          RELEASE_GPG_PASSPHRASE: ${{ secrets.RELEASE_GPG_PASSPHRASE }}
      - run: ./scripts/release-smoke.sh
      - uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            dist/sis_*
            dist/sis.spdx.json
            dist/SHA256SUMS*
            dist/release-signing-public-key.asc
